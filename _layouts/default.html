<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{{ page.title }} | 狗熊岭乐园</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
    {% feed_meta %}
    {% seo %}
    <style>
      body {
        font-family: "微软雅黑", Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #e8f5e9;
      }
      .header {
        text-align: center;
        padding: 10px;
        background: linear-gradient(135deg, #3a7d44 0%, #2d5a27 100%);
      }
      .header img {
        height: 70px;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 10px;
      }
      footer {
        background: #3a7d44;
        color: #fff;
        text-align: center;
        padding: 20px;
        margin-top: 40px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img src="/assets/images/logo.png" alt="熊出没LOGO">
    </div>

    {% include navigation.html %}

    <div class="container">
      {{ content }}
    </div>

    <footer>
      <p>🐻 狗熊岭乐园 | 熊出没主题站点 🐻</p>
      <p>爱护森林，快乐生活 | © 2026</p>
    </footer>

    {% if jekyll.environment == "production" %}
    <!-- 生产环境统计脚本位置 -->
    {% endif %}
  </body>
</html>
