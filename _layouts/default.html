<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{{ page.title }} | 狗熊岭乐园</title>
    {% feed_meta %}
    {% seo %}
    <style>
/* 全局熊出没森林主题配色 */
body {
  margin: 0;
  padding: 0;
  font-family: "微软雅黑",Arial,sans-serif;
  background: linear-gradient(#e8f5e9,#f1f8e9);
  color: #2c3e50;
  line-height: 1.8;
}

/* 整体容器居中、加圆角阴影卡片 */
.container,main {
  max-width: 1100px;
  margin: 20px auto;
  padding: 30px;
  background: #ffffff;
  border-radius: 16px;
  box-shadow: 0 4px 15px rgba(44,110,73,0.15);
}

/* 标题美化 森林绿+居中 */
h1,h2,h3 {
  color: #2c6e49;
  text-align: center;
  font-weight: bold;
}

/* 段落文字美化 间距加大 */
p {
  font-size: 16px;
  margin: 12px 0;
  padding: 0 10px;
}

/* 图片统一样式：圆角、居中、自适应 */
img {
  display: block;
  margin: 25px auto;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  max-width: 90%;
  height: auto;
  transition: transform 0.3s ease;
}

/* 图片鼠标悬停轻微放大 更灵动 */
img:hover {
  transform: scale(1.02);
}

/* 导航栏美化 深绿底色、圆角 */
nav {
  background-color: #2c6e49;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  margin: 15px 10px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

nav a {
  color: #fff;
  text-decoration: none;
  margin: 0 15px;
  font-size: 17px;
}

nav a:hover {
  color: #f9c74f;
}

/* 角色板块单独卡片样式 */
.role-box {
  display: flex;
  justify-content: space-around;
  flex-wrap: wrap;
  gap: 20px;
  margin: 30px 0;
}

.role-item {
  padding: 20px;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 12px rgba(44,110,73,0.12);
  text-align: center;
  width: 260px;
  transition: all 0.3s ease;
}

.role-item:hover {
  transform: translateY(-6px);
  box-shadow: 0 8px 20px rgba(44,110,73,0.18);
}

/* 页脚样式 */
footer {
  background: #2c6e49;
  color: #fff;
  text-align: center;
  padding: 20px;
  margin-top: 40px;
}

footer a {
  color: #f9c74f;
}

/* 头部LOGO区域 */
.header {
  text-align: center;
  padding: 10px;
  background: linear-gradient(135deg, #2c6e49 0%, #1a4d32 100%);
}
.header img {
  height: 70px;
}
    </style>
  </head>
  <body>
    <div class="header">
      <img src="/assets/images/logo.png" alt="熊出没LOGO">
    </div>

    <nav>
      <a href="/">首页</a>
      <a href="/about">动画介绍</a>
      <a href="/blog">狗熊岭日记</a>
      <a href="/staff">角色档案</a>
    </nav>

    <div class="container">
      {{ content }}
    </div>

    <footer>
      <p>🐻 狗熊岭乐园 | 熊出没主题站点 🐻</p>
      <p>爱护森林，快乐生活 | © 2026</p>
      <p>联系方式：<a href="mailto:13617343090@163.com">13617343090@163.com</a> | GitHub：<a href="https://github.com/lyq-bx">github.com/lyq-bx</a></p>
    </footer>

    <script src="/js.js"></script>
  </body>
</html>
