---
layout: default
---

<article style="background: #fff; border: 2px solid #684526; border-radius: 12px; padding: 25px; margin: 20px 0;">
  <h1 style="color: #3a7d44; border-bottom: 2px solid #fcd044; padding-bottom: 10px;">{{ page.title }}</h1>

  <div style="color: #666; font-size: 14px; margin-bottom: 20px;">
    <span>📅 发布日期：{{ page.date | date: "%Y年%m月%d日" }}</span>
  </div>

  <div style="line-height: 1.8; font-size: 16px;">
    {{ content }}
  </div>

  <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #ddd;">
    <a href="/blog" style="color: #3a7d44; font-weight: bold;">← 返回狗熊岭日记</a>
  </div>
</article>
